<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login</title>
<style>
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:32px; width:360px; }
  h1 { margin:0 0 8px; font-size:22px; }
  p { color:#94a3b8; margin:0 0 24px; font-size:14px; }
  label { display:block; font-size:13px; color:#94a3b8; margin-bottom:6px; }
  input { width:100%; padding:10px 12px; background:#0f172a; border:1px solid #334155; border-radius:6px; color:#e2e8f0; font-size:14px; box-sizing:border-box; }
  input:focus { outline:none; border-color:#3b82f6; }
  button { width:100%; padding:10px; background:#3b82f6; color:white; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; margin-top:16px; }
  button:hover { background:#2563eb; }
  .error { background:rgba(239,68,68,0.1); border:1px solid #ef4444; color:#fecaca; padding:10px 12px; border-radius:6px; font-size:13px; margin-top:12px; display:none; }
</style>
</head>
<body>
<div class="card">
  <h1>Admin Login</h1>
  <p>Masuk untuk mengelola API keys dan order.</p>
  <form id="loginForm">
    <label>Password</label>
    <input type="password" id="password" required autofocus />
    <button type="submit">Masuk</button>
    <div id="error" class="error"></div>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');
  errorEl.style.display = 'none';

  try {
    const res = await fetch('/admin/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ password })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/admin';
    } else {
      errorEl.textContent = data.message || 'Login gagal';
      errorEl.style.display = 'block';
    }
  } catch (err) {
    errorEl.textContent = 'Koneksi gagal';
    errorEl.style.display = 'block';
  }
});
</script>
</body>
</html>
